{% extends 'base.html' %}
{% block content %}
<h2>Available Books</h2>

<table class="table table-bordered">
<tr>
    <th>Title</th>
    <th>Author</th>
    <th>Quantity</th>
</tr>

{% for book in books %}
<tr>
    <td>{{book[1]}}</td>
    <td>{{book[2]}}</td>
    <td>{{book[3]}}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
